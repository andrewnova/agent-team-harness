<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent Team Harness Flow</title>
  <desc id="desc">Codex routes work, Claude handles frontend tasks, Codex handles backend and proof, and a durable mailbox connects both agents.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .primary { fill: #0f172a; }
      .muted { fill: #475569; }
      .blue { fill: #2563eb; }
      .green { fill: #059669; }
      .orange { fill: #ea580c; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h1 { font-size: 30px; font-weight: 750; }
      .h2 { font-size: 20px; font-weight: 700; }
      .body { font-size: 15px; }
      .small { font-size: 13px; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="980" height="520"/>
  <text class="primary h1" x="50" y="60">Agent Team Harness</text>
  <text class="muted body" x="50" y="88">Codex leads orchestration. Claude handles frontend work. The mailbox is the shared truth.</text>

  <rect class="panel" x="50" y="125" width="250" height="125"/>
  <text class="blue h2" x="80" y="165">Codex Harness</text>
  <text class="muted body" x="80" y="195">Plans, routes, merges,</text>
  <text class="muted body" x="80" y="218">tests, and proves done.</text>

  <rect class="panel" x="365" y="125" width="250" height="125"/>
  <text class="orange h2" x="395" y="165">Claude Teammate</text>
  <text class="muted body" x="395" y="195">Owns UI/UX/frontend</text>
  <text class="muted body" x="395" y="218">tasks and critique.</text>

  <rect class="panel" x="680" y="125" width="250" height="125"/>
  <text class="green h2" x="710" y="165">Proof Gates</text>
  <text class="muted body" x="710" y="195">Reviews, browser proof,</text>
  <text class="muted body" x="710" y="218">tests, and closeout.</text>

  <rect class="panel" x="190" y="325" width="600" height="115"/>
  <text class="primary h2" x="220" y="367">Durable Mailbox + Local State</text>
  <text class="muted body" x="220" y="398">Goals, tasks, leases, replies, check-ins, reviews, proof, and reports.</text>
  <text class="muted small" x="220" y="423">Codex and Claude can both send updates without blocking each other.</text>

  <path class="line" d="M300 188 H365"/>
  <path class="line" d="M615 188 H680"/>
  <path class="line" d="M805 250 V325"/>
  <path class="line" d="M175 250 V382 H190"/>
  <path class="dash" d="M490 250 V325"/>
  <path class="dash" d="M490 325 V250"/>
  <path class="dash" d="M490 440 V470 H805 V250"/>
  <path class="dash" d="M490 440 V470 H175 V250"/>
</svg>
